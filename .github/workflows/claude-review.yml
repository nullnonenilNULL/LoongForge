name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: read
  # Required: anthropics/claude-code-action@v1 unconditionally requests an
  # OIDC token in setupGitHubToken() during run.ts startup; without this
  # permission ACTIONS_ID_TOKEN_REQUEST_URL is unset and the action fails
  # with "Could not fetch an OIDC token" before it ever reads
  # anthropic_api_key.
  id-token: write

# Same-PR @claude bursts collapse to the latest run instead of piling up
# behind the single self-hosted runner slot. Different PRs still run in
# parallel (subject to runner availability).
concurrency:
  group: claude-review-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  claude:
    # Run only when @claude is mentioned AND the commenter is a trusted
    # actor on the repo (or the PR/issue author themselves). Without this
    # gate, anyone on the public internet who can comment on the repo
    # (e.g. a fork-PR contributor) could trigger paid agent runs and
    # execute tools on the self-hosted runner.
    if: >-
      (
        github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '@claude') &&
        (
          contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association) ||
          github.event.comment.user.login == github.event.issue.user.login
        )
      ) ||
      (
        github.event_name == 'pull_request_review_comment' &&
        contains(github.event.comment.body, '@claude') &&
        (
          contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association) ||
          github.event.comment.user.login == github.event.pull_request.user.login
        )
      ) ||
      (
        github.event_name == 'pull_request_review' &&
        contains(github.event.review.body, '@claude') &&
        (
          contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.review.author_association) ||
          github.event.review.user.login == github.event.pull_request.user.login
        )
      ) ||
      (
        github.event_name == 'issues' &&
        (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')) &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association)
      )
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 15
    steps:
      - name: Trust workspace (self-hosted runner)
        # The runner process runs as root but _work/ files were created
        # by other users in earlier sessions, so git's CVE-2022-24765
        # check (`fatal: detected dubious ownership`) trips when
        # claude-code-action runs `git fetch` from outside the
        # actions/checkout step's temporary HOME. Write safe.directory
        # into BOTH /root/.gitconfig (for the default-HOME steps) and
        # /ssd1/runner-home/.gitconfig (for the Claude action step,
        # which we relocate below). Verified against runs 27542697733
        # and 27544080883.
        run: |
          mkdir -p /ssd1/runner-home/.claude/downloads
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          HOME=/ssd1/runner-home git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          # issue_comment events default to the repo's default branch — review
          # tools (Read/Grep/Glob) would then see the wrong code. Resolve to
          # the PR head SHA when available, otherwise refs/pull/<n>/head.
          ref: ${{ github.event.pull_request.head.sha || format('refs/pull/{0}/head', github.event.issue.number) }}
          fetch-depth: 50
          # _work is reused across jobs on a self-hosted runner; don't leave
          # GITHUB_TOKEN behind in .git/config for the next workflow.
          persist-credentials: false

      - name: Claude Code Action Official
        uses: anthropics/claude-code-action@v1
        env:
          # Route Claude API traffic through the internal proxy.
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          # Override HOME so the action's install.sh writes the Claude CLI
          # binary onto /ssd1 instead of the 19G root filesystem.
          HOME: /ssd1/runner-home
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # track_progress shows a live checkbox list in the bot's
          # initial PR comment as the agent works.
          track_progress: true
          # Default trigger phrase is @claude.
          # claude_args:
          # - Model ID matches what the internal gateway exposes via
          #   /v1/models (display-name form with spaces, not the
          #   canonical Anthropic ID).
          # - --allowedTools explicitly enables the inline review-comment
          #   MCP tool (not in the default allow-list) plus the gh
          #   subcommands and read-only filesystem tools the agent needs
          #   to actually inspect the diff and modified files.
          claude_args: |
            --model "Claude Sonnet 4.6"
            --max-turns 20
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Read,Grep,Glob"
          # NOTE: do NOT set `prompt:` here. Setting it puts the action in
          # custom-automation mode, which overrides the user's @claude
          # comment and skips the GitHub MCP tool injection — meaning the
          # agent has no way to post a review back. With `prompt:` empty,
          # the action's default agent mode injects PR context + GitHub
          # tools, and the user's @claude comment becomes the agent input.
          # Project-wide instructions (e.g. "use skills/code-review/SKILL.md
          # when reviewing") belong in CLAUDE.md, which the agent loads
          # automatically.
